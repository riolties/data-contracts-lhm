version: 1.0.0
apiVersion: v3.1.0
kind: DataContract
id: lhm:mobilitaetsreferat:input:radverkehr
status: active
name: Radverkehr Tageswerte München — Rohdaten
domain: mobilitaetsreferat
description:
  purpose: Tägliche Radverkehrszahlen je Dauerzählstelle inkl. Wetterdaten.
  usage: Input-Port des Datenprodukts radverkehr — Quelle für dlt-Ingestion.
  limitations: Nur Dauerzählstellen; Wetter aggregiert je Tag.
servers:
- server: csv-export
  type: local
  description: CSV File-Export (data/sample_radverkehr_tageswerte_2025_01.csv).
  path: data/sample_radverkehr_tageswerte_2025_01.csv
  format: csv
schema:
- name: radverkehr_rohdaten
  logicalType: object
  physicalType: csv
  physicalName: sample_radverkehr_tageswerte_2025_01.csv
  dataGranularityDescription: Eine Zeile je Datensatz.
  properties:
  - name: datum
    logicalType: date
    physicalType: DATE
    required: true
    description: datum.
  - name: uhrzeit_start
    logicalType: time
    physicalType: TIME
    required: true
    description: uhrzeit_start.
  - name: uhrzeit_ende
    logicalType: string
    physicalType: VARCHAR
    required: true
    description: uhrzeit_ende.
  - name: zaehlstelle
    logicalType: string
    physicalType: VARCHAR
    required: true
    description: zaehlstelle.
  - name: richtung_1
    logicalType: integer
    physicalType: INTEGER
    required: true
    description: richtung_1.
  - name: richtung_2
    logicalType: integer
    physicalType: INTEGER
    required: true
    description: richtung_2.
  - name: gesamt
    logicalType: integer
    physicalType: INTEGER
    required: true
    description: gesamt.
  - name: min-temp
    logicalType: number
    physicalType: DOUBLE
    required: true
    description: min-temp.
  - name: max-temp
    logicalType: number
    physicalType: DOUBLE
    required: true
    description: max-temp.
  - name: niederschlag
    logicalType: number
    physicalType: DOUBLE
    required: true
    description: niederschlag.
  - name: bewoelkung
    logicalType: integer
    physicalType: INTEGER
    required: true
    description: bewoelkung.
  - name: sonnenstunden
    logicalType: number
    physicalType: DOUBLE
    required: true
    description: sonnenstunden.
  quality:
  - type: text
    dimension: accuracy
    severity: error
    name: gesamt___richtung_1___richtung_2
    description: 'Ausdruck: gesamt = richtung_1 + richtung_2.'
    customProperties:
    - property: engine
      value: sql
    - property: query
      value: SELECT count(*) FROM radverkehr_rohdaten WHERE NOT (gesamt = richtung_1
        + richtung_2)
    - property: expect
      value: 0
  - type: text
    name: row_count_min
    description: Mindestens eine Zeile geliefert.
    dimension: completeness
    severity: error
    customProperties:
    - property: engine
      value: row_count_min
    - property: min
      value: 1
slaProperties:
- property: frequency
  value: 1
  unit: mo
customProperties:
- property: classification
  value: public
- property: contract_status
  value: active
- property: personal_data
  value: false
- property: open_data_candidate
  value: true
- property: license
  value: https://creativecommons.org/publicdomain/zero/1.0/
- property: spatial
  value: https://sws.geonames.org/2867714/
- property: accrual_periodicity
  value: P1M
- property: govdata_category
  value:
  - http://publications.europa.eu/resource/authority/data-theme/TRAN
